<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>2026-2 SNU 과목 시간대 조회</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23142b46'/%3E%3Cpath d='M8 10h16v3H8zm0 5h16v3H8zm0 5h10v3H8z' fill='%23ffffff'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="meta">서울대학교 수강편람 · 2026-2</p>
        <h1>과목 시간대 조회</h1>
      </div>
      <a class="download" href="./snu_course_times_2026_2.xlsx" download>Excel 다운로드</a>
    </header>

    <main class="shell">
      <section class="summary" aria-label="요약">
        <div class="metric">
          <span>표시 과목</span>
          <strong id="visibleCount">0</strong>
        </div>
        <div class="metric">
          <span>전체 행</span>
          <strong id="totalCount">0</strong>
        </div>
        <div class="metric">
          <span>시간 복원</span>
          <strong id="timedCount">0</strong>
        </div>
        <div class="metric wide">
          <span>수집 기준</span>
          <strong id="fetchedAt">-</strong>
        </div>
      </section>

      <section class="filters" aria-label="필터">
        <label class="field search">
          <span>검색</span>
          <input id="searchInput" type="search" placeholder="과목명, 과목번호, 교수명" autocomplete="off" />
        </label>

        <fieldset class="checkgroup">
          <legend>구분</legend>
          <label><input type="checkbox" name="category" value="교양" checked />교양</label>
          <label><input type="checkbox" name="category" value="학사" checked />학사</label>
          <label><input type="checkbox" name="category" value="대학원" checked />대학원</label>
        </fieldset>

        <fieldset class="checkgroup">
          <legend>학년</legend>
          <label><input type="checkbox" name="grade" value="1학년" checked />1</label>
          <label><input type="checkbox" name="grade" value="2학년" checked />2</label>
          <label><input type="checkbox" name="grade" value="3학년" checked />3</label>
          <label><input type="checkbox" name="grade" value="4학년" checked />4</label>
          <label><input type="checkbox" name="grade" value="5학년" checked />5</label>
          <label><input type="checkbox" name="grade" value="미지정" checked />미지정</label>
        </fieldset>

        <fieldset class="checkgroup">
          <legend>전공여부</legend>
          <label><input type="checkbox" name="major" value="전공" checked />전공</label>
          <label><input type="checkbox" name="major" value="비전공" checked />비전공</label>
        </fieldset>

        <label class="field">
          <span>학과</span>
          <input id="departmentInput" list="departmentList" placeholder="전체" autocomplete="off" />
          <datalist id="departmentList"></datalist>
        </label>

        <fieldset class="checkgroup days">
          <legend>요일</legend>
          <label><input type="checkbox" name="day" value="월" />월</label>
          <label><input type="checkbox" name="day" value="화" />화</label>
          <label><input type="checkbox" name="day" value="수" />수</label>
          <label><input type="checkbox" name="day" value="목" />목</label>
          <label><input type="checkbox" name="day" value="금" />금</label>
          <label><input type="checkbox" name="day" value="토" />토</label>
        </fieldset>

        <div class="field pair">
          <span>시작 시간</span>
          <select id="startTime"></select>
          <select id="endTime"></select>
        </div>

        <label class="toggle">
          <input id="timedOnly" type="checkbox" />
          <span>시간 있는 과목만</span>
        </label>

        <button id="resetButton" class="reset" type="button">초기화</button>
      </section>

      <section class="workspace">
        <div class="tablePane">
          <div class="tableHead">
            <h2>필터 결과</h2>
            <span id="resultNote">-</span>
          </div>
          <div class="tableWrap">
            <table>
              <thead>
                <tr>
                  <th>구분</th>
                  <th>학년</th>
                  <th>전공</th>
                  <th>학과</th>
                  <th>과목명</th>
                  <th>과목번호</th>
                  <th>분반</th>
                  <th>담당교수</th>
                  <th>학점</th>
                  <th>요일</th>
                  <th>묶은 시간표</th>
                </tr>
              </thead>
              <tbody id="courseBody"></tbody>
            </table>
          </div>
          <button id="moreButton" class="more" type="button">더 보기</button>
        </div>

        <aside class="detail" aria-label="선택 과목">
          <p class="meta">선택 과목</p>
          <h2 id="detailTitle">과목을 선택하세요</h2>
          <dl id="detailList"></dl>
        </aside>
      </section>
    </main>

    <script src="./data/courses-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
